name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Provide test config
        # The real secrets/api_config.ini is gitignored; the tracked example carries every
        # section the tests need (Firebase creds are monkeypatched, so no real key required).
        run: cp secrets/example_api_config.ini secrets/api_config.ini
      - name: Run tests
        run: pytest -q
