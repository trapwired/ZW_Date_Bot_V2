name: Deploy
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
jobs:
  deploy:
    # Only deploy when the CI run that triggered this finished green.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/ZW_Date_Bot_V2
            before=$(git rev-parse HEAD)
            git pull origin main
            after=$(git rev-parse HEAD)
            if ! git diff --quiet "$before" "$after" -- requirements.txt; then
              echo "requirements.txt changed — updating packages"
              venv/bin/pip install --upgrade pip
              venv/bin/pip install -r requirements.txt
            fi
            systemctl restart zwdatebot
