# Local dev run (see docs/local-dev.md): postgres + the bot on a DEV bot token,
# fully offline from prod. From the repo root:
#
#   docker compose -f deploy/compose.local.yml up --build
#
# Expects ./secrets-local/api_config.ini (gitignored) with the dev token,
# backend = postgres and dsn = postgresql://zwdatebot:zwdatebot@postgres:5432/zwdatebot.
# Seed test data:  ./venv/bin/python scripts/seed_local_db.py
# Explicit project name: the default ("deploy", from the directory) collides with
# any other repo whose compose file also lives in deploy/ and hijacks its containers.
name: zwdatebot-local

services:
  zwdatebot:
    build: ..
    container_name: zwdatebot-local
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../secrets-local:/app/secrets:ro

  postgres:
    image: postgres:16
    container_name: zwdatebot-local-postgres
    environment:
      POSTGRES_USER: zwdatebot
      POSTGRES_PASSWORD: zwdatebot
      POSTGRES_DB: zwdatebot
    ports:
      - "127.0.0.1:5434:5432"   # seed script + psql from the host
    volumes:
      - pgdata-local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zwdatebot"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata-local:
