[Firebase]
credentialsFileName = credentials-filename.json

[Telegram]
api_token = obtain-via-Botfather-from-telegram
# Must be int-parsable: the test harness registers a default team under this id and the
# Used ONLY by scripts/migrate_to_multi_team.py (and the test fixtures) to seed the
# initial team's membership group. At runtime /start gates against the group chats of
# the REGISTERED TEAMS (Firestore), not this key.
group_chat_id = -100123456789

[Tables]
# Each table needs a DISTINCT collection name (the tests' in-memory Firestore segregates by it).
GAME_ATTENDANCE_TABLE = game_attendance
GAMES_TABLE = games
USERS_TABLE = users
USERS_TO_STATE_TABLE = users_to_state
TIMEKEEPING_ATTENDANCE_TABLE = timekeeping_attendance
TIMEKEEPING_TABLE = timekeeping
TRAINING_ATTENDANCE_TABLE = training_attendance
TRAININGS_TABLE = trainings
PLAYER_METRIC = player_metric
TEMP_DATA = temp_data
SETTINGS_TABLE = settings
TEAMS_TABLE = teams

[Chats]
# Migration seed / test fixture only: at runtime the spectator password is per team,
# set via the admin menu.
SPECTATOR_PASSWORD = somePassword

[Chat_Ids]
# Telegram chat ids are integers (group ids are negative); values below are fake placeholders.
MAINTAINER = 123456789
TRAINERS_GAMES = 111111111, 222222222
TRAINERS_TRAINING = 111111111, 222222222
GROUP_CHAT = -100123456789

[Scheduling]
GAME_INDIVIDUAL = 28, 29, 30, 32, 36, 43, 57
TRAINING_INDIVIDUAL = 7, 8, 9, 10, 12, 16
TIMEKEEPING_INDIVIDUAL = 14, 16, 20, 28

[Flags]
TEST_SYSTEM = true